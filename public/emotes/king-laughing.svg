<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- Face/beard shape -->
  <ellipse cx="60" cy="85" rx="48" ry="45" fill="#5C3A1E"/>
  <ellipse cx="60" cy="78" rx="42" ry="38" fill="#E8A0B0"/>
  <!-- Squinting happy eyes -->
  <path d="M32 72 Q42 62 52 72" stroke="#2A1A0A" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M68 72 Q78 62 88 72" stroke="#2A1A0A" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Big laughing mouth -->
  <ellipse cx="60" cy="92" rx="24" ry="18" fill="#6B1A4A"/>
  <ellipse cx="60" cy="86" rx="20" ry="6" fill="white"/>
  <!-- Tongue -->
  <ellipse cx="60" cy="102" rx="12" ry="8" fill="#D4576B"/>
  <!-- Crown -->
  <polygon points="24,45 30,20 42,38 52,8 60,35 68,8 78,38 90,20 96,45" fill="#FFD700"/>
  <polygon points="24,45 96,45 92,55 28,55" fill="#DAA520"/>
  <!-- Crown gems -->
  <circle cx="52" cy="26" r="4" fill="#FF4444"/>
  <circle cx="68" cy="26" r="4" fill="#4488FF"/>
  <circle cx="60" cy="42" r="3" fill="#44FF44"/>
  <!-- Cheek blush -->
  <ellipse cx="35" cy="82" rx="8" ry="5" fill="#FF8888" opacity="0.5"/>
  <ellipse cx="85" cy="82" rx="8" ry="5" fill="#FF8888" opacity="0.5"/>
  <!-- Tear drops (from laughing) -->
  <ellipse cx="28" cy="76" rx="3" ry="5" fill="#88DDFF" opacity="0.6"/>
  <ellipse cx="92" cy="76" rx="3" ry="5" fill="#88DDFF" opacity="0.6"/>
</svg>
